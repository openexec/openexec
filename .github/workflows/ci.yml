name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        go-version: ['1.25']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}
        cache: true

    - name: Install dependencies
      run: go mod download

    - name: Build
      run: go build -v -o bin/openexec ./cmd/openexec

    - name: Test
      run: go test -v ./...

    - name: Compatibility Regression
      run: make compat-test

    - name: Lint
      uses: golangci/golangci-lint-action@v6
      with:
        version: latest
