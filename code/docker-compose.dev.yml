services:
  openexec:
    image: golang:1.25
    container_name: openexec_dev
    env_file:
      - .env
    environment:
      - PORT=8765
    command: ["start", "--data-dir", "/data", "--port", "8765"]
    entrypoint: ["go", "run", "./cmd/openexec"]
    ports:
      - "8765:8765"
    volumes:
      - ..:/app:cached
      - ./data:/data
    working_dir: /app

networks:
  default:
    name: openexec_net
